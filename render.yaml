services:
  - type: web
    name: skylight-cloud
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skylight-postgres
          property: connectionString
      - key: APP_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_PROVIDER_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_1_TO_4
        sync: false
      - key: STRIPE_PRICE_5_TO_20
        sync: false
      - key: STRIPE_PRICE_20_PLUS
        sync: false

databases:
  - name: skylight-postgres
    plan: free
    databaseName: skylight_cloud
    user: skylight

